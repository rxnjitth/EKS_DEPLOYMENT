apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: certificate-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 346273507930.dkr.ecr.ap-southeast-1.amazonaws.com/certificate-tracker/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: BACKEND_URL
          value: "http://backend-service:5000"
